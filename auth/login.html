<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TIMEWISE</title>
    <link rel="stylesheet" href="../styles/glass.css">
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .password-box {
            position: relative;
        }
        .eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <button class="glass-btn" style="position: fixed; top: 20px; right: 20px; padding: 10px;" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="glass-panel box">
        <h1 style="letter-spacing: 4px; margin-bottom: 5px;">TIMEWISE</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Your AI Study Architect</p>

        <div id="message" class="message"></div>

        <div class="input-group">
            <input id="emailInput" type="email" class="glass-input" placeholder="Email Address">
        </div>

        <div class="input-group password-box">
            <input id="passwordInput" type="password" class="glass-input" placeholder="Password">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <button class="glass-btn primary" style="width: 100%; margin-top: 10px;" onclick="login()">Login</button>

        <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px; opacity: 0.5;">
            <hr style="flex: 1; border: 0; border-top: 1px solid white;">
            <span>OR</span>
            <hr style="flex: 1; border: 0; border-top: 1px solid white;">
        </div>

        <button class="glass-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="googleLogin()">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" style="width: 20px; filter: brightness(0) invert(1);">
            Continue with Google
        </button>

        <p style="margin-top: 25px; font-size: 0.9rem; opacity: 0.8;">
            Don't have an account? <a href="signup.html" style="color: var(--accent); font-weight: 600;">Sign Up</a>
        </p>
        <p onclick="forgotPassword()" style="margin-top: 10px; font-size: 0.8rem; opacity: 0.6; cursor: pointer;">Forgot Password?</p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
